<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서비스센터 입출차 v2.2</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --warning: #d97706; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .card { background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .card-header { padding: 12px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; border-radius: 15px 15px 0 0; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 15px; }
        
        /* 알림판 UX */
        #display-screen { min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 12px; margin-bottom: 15px; padding: 20px; border: 3px solid #cbd5e1; background: #fff; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .msg-main { font-size: 1.6rem; font-weight: 900; line-height: 1.2; word-break: keep-all; }
        .msg-sub { font-size: 1rem; color: #64748b; margin-top: 8px; }

        /* 버튼 디자인 */
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .btn-main { height: 100px; font-size: 1.3rem; color: white; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--warning); }
        .btn-scan { background: var(--primary); color: white; padding: 15px; width: 100%; font-size: 1.1rem; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        /* 파일 선택 라벨 */
        .file-label { display: block; padding: 20px; border: 2px dashed #94a3b8; border-radius: 12px; text-align: center; margin-bottom: 10px; font-weight: 600; color: #475569; }
        input[type="file"] { display: none; }

        /* 에러 및 상태 표시 */
        .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 8px; font-weight: 700; white-space: pre-line; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #e2e8f0; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: none; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body>
